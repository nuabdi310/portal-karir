name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Ambil source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install dependency
      - name: Install dependencies
        run: npm ci

      # Build Vue/Vite
      - name: Build frontend
        run: npm run build

      # Siapkan folder di VPS
      - name: Prepare VPS directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/career
            sudo rm -rf /var/www/career/*
            sudo chown -R $USER:$USER /var/www/career

      # Upload hasil build
      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/"
          target: "/var/www/career/"
          strip_components: 1

      # Set permission untuk Nginx
      - name: Set permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/career
            sudo chmod -R 755 /var/www/career
